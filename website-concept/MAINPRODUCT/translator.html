<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>RAG Prototype</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudfare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <h1>RAG Prototype</h1>

    <nav class="navbar">
        <ul>
            <li><a href="prototype.html">Home</a></li>
            <li><a href="translator.html">DeepL NMT</a></li>
            <li><a href="LLM.html">LLM with RAG</a></li>
        </ul>
    </nav>


    <div class="container">
        <div class="wrapper">
            <div class="text-input">
                <textarea class="from-text" placeholder="Enter text"></textarea>
                <textarea class="to-text" placeholder="Translation" readonly disabled></textarea>
            </div>
            <ul class="controls">
                <li class="row from">
                    <div class="icons">
                        <i class="fa-regular fa-copy"></i>
                    </div>
                    <select>
                        <option value="EN-GB">English</option>
                    </select>
                </li>
                <li class="exchange"><i class="fa-solid fa-arrow-right-arrow-left"></i></li>
                <li class="row to">
                    <select>
                        <option value="EN-GB">English</option>
                        <option value="DE">German</option>
                    </select>
                    <div class="icons">
                        <i class="fa-regular fa-copy"></i>
                    </div>
                </li>
            </ul>
        </div>
        <button>Translate Text</button>
      </div>

    <script src="work/js/countries.js"></script>
    <script src="work/js/script.js"></script>
    
</body>
</html>
